<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Lex - Light Mode Challenge</title>
    <script>
        // Device Detection & Redirection
        const ua = navigator.userAgent;
        // iPad Pro (MacIntel + touch) or common tablet UAs
        const isTablet = /(ipad|tablet|(android(?!.*mobile))|(windows(?!.*phone)(.*touch))|kindle|playbook|silk|(puffin(?!.*(IP|AP|WP))))/i.test(ua) || (navigator.maxTouchPoints > 2 && /MacIntel/.test(navigator.platform));
        const isMobile = /Mobile|iP(hone|od)|Android|BlackBerry|IEMobile|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua);

        if (isTablet) {
            window.location.replace("tablet.html");
        } else if (isMobile) {
            window.location.replace("mobile.html");
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jua&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.3);
            --secondary: #db2777;
            --background: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --error: #ef4444;
            --success: #10b981;
            --font-main: 'Jua', 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(219, 39, 119, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Jua', sans-serif !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Header & Stats --- */
        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stats-panel {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            background: var(--surface);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
            color: var(--text-main);
        }

        .stat-item.timer {
            border-color: var(--secondary);
            background: rgba(219, 39, 119, 0.05);
        }

        .stat-item.timer .stat-value {
            color: var(--secondary);
        }

        /* --- Game Board --- */
        #game-container {
            position: relative;
            width: 900px;
            height: 900px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        #game-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- UI Elements --- */
        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }

        .mode-selection {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 16px;
            border: 1px inset rgba(0, 0, 0, 0.05);
        }

        /* Custom Scrollbar */
        .mode-selection::-webkit-scrollbar {
            width: 6px;
        }

        .mode-selection::-webkit-scrollbar-track {
            background: transparent;
        }

        .mode-selection::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .mode-selection::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .btn-mode {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 8px 0;
            border-radius: 10px;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
        }

        .btn-mode:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: translateY(-2px);
        }

        .btn-mode.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .search-wrapper {
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            position: relative;
        }

        #chapter-search {
            width: 100%;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: 'Jua', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #chapter-search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* --- Typing Area --- */
        .typing-section {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            text-align: center;
        }

        #word-display {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-family: 'Jua', sans-serif !important;
            min-height: 90px;
            color: #cbd5e1;
        }

        #word-display span.correct {
            color: var(--primary);
        }

        #word-display span.current {
            border-bottom: 5px solid var(--secondary);
            color: var(--text-main);
        }

        #word-display span.error {
            color: var(--error);
            position: relative;
        }

        #word-display span.error::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--error);
            border-radius: 2px;
        }

        #meaning-display {
            font-size: 2.2rem;
            color: var(--primary);
            height: 2.8rem;
            margin-bottom: 30px;
            transition: all 0.3s;
            font-weight: 800;
        }

        #typing-input {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 16px 32px;
            font-size: 1.6rem;
            color: var(--text-main);
            width: 450px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            font-family: 'Jua', sans-serif !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        #typing-input:focus {
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
        }

        /* Combo & Effects */
        .combo-counter {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 3rem;
            font-weight: 900;
            color: var(--secondary);
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .combo-counter.active {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.2s ease-in-out;
        }

        @keyframes correct-flash {
            0% {
                background-color: #fff;
            }

            50% {
                background-color: rgba(16, 185, 129, 0.2);
            }

            100% {
                background-color: #fff;
            }
        }

        .correct-flash {
            animation: correct-flash 0.15s ease-out;
        }

        /* Volume Control */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .volume-control input[type="range"] {
            width: 80px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .volume-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">DINO LEX</div>
        <div class="volume-control">
            <span class="volume-label">🔊</span>

                <span id="words-count" class="stat-value">0</span>

        </div>
    </div>

    <div id="game-container">
        <div id="game-stage">
            <canvas id="game-canvas" width="900" height="900"></canvas>

        <div id="combo" class="combo-counter">0</div>

        <!-- Overlays -->
        <div id="start-screen" class="game-overlay">
            <h1 id="start-title" style="font-size: 2.8rem; margin-bottom: 5px; font-weight: 800;">Dino Lex</h1>

        </div>

        <div id="stage-clear-screen" class="game-overlay hidden">
            <h1 style="font-size: 4rem; color: var(--success); margin-bottom: 5px; font-weight: 800;">STAGE CLEAR!</h1>
            <p style="font-size: 1.8rem; margin-bottom: 35px; font-weight: 600;">Get ready for the next stage...</p>

        <div id="game-over-screen" class="game-overlay hidden">
            <h1 style="font-size: 4rem; color: var(--primary); margin-bottom: 5px; font-weight: 800;">ALL CLEAR!</h1>
            <p id="final-stats-text" style="font-size: 1.8rem; margin-bottom: 35px; font-weight: 600;">Words Correct: 0
            </p>
            <div style="display: flex; gap: 15px;">
                <button class="btn-primary" onclick="startGame()">PLAY AGAIN</button>
                <button class="btn-primary" style="background: var(--text-dim); box-shadow: none;"
                    onclick="showMenu()">MENU</button>
            </div>
        </div>
    </div>

    <div id="typing-section" class="typing-section hidden">

        <div id="word-display"></div>

            <input type="text" id="typing-input" placeholder="" autocomplete="off" disabled>
        </div>
    </div>

    <script>
        // --- Hangul Automata Engine ---
        const Hangul = {
            cho: "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ",
            jung: "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ",
            jong: " ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ",
            alphabet: {

                'y': 'ㅛ', 'u': 'ㅕ', 'i': 'ㅑ', 'o': 'ㅐ', 'O': 'ㅒ', 'p': 'ㅔ', 'P': 'ㅖ', 'h': 'ㅗ', 'j': 'ㅓ', 'k': 'ㅏ', 'l': 'ㅣ', 'b': 'ㅠ', 'n': 'ㅜ', 'm': 'ㅡ'
            },
            compose: function (chars) {
                if (!chars) return "";
                let res = "";
                let i = 0;
                while (i < chars.length) {
                    let c = this.alphabet[chars[i]] || chars[i];
                    let choIdx = this.cho.indexOf(c);
                    if (choIdx !== -1 && i + 1 < chars.length) {
                        let n = this.alphabet[chars[i + 1]] || chars[i + 1];
                        let jungIdx = this.jung.indexOf(n);
                        if (jungIdx !== -1) {
                            let currentJungIdx = jungIdx;
                            let nextI = i + 2;
                            if (nextI < chars.length) {
                                let n2 = this.alphabet[chars[nextI]] || chars[nextI];
                                let dv = "";
                                if (n === 'ㅗ') { if (n2 === 'ㅏ') dv = 'ㅘ'; else if (n2 === 'ㅐ') dv = 'ㅙ'; else if (n2 === 'ㅣ') dv = 'ㅚ'; }
                                else if (n === 'ㅜ') { if (n2 === 'ㅓ') dv = 'ㅝ'; else if (n2 === 'ㅔ') dv = 'ㅞ'; else if (n2 === 'ㅣ') dv = 'ㅟ'; }
                                else if (n === 'ㅡ' && n2 === 'ㅣ') dv = 'ㅢ';
                                if (dv) { currentJungIdx = this.jung.indexOf(dv); nextI++; }
                            }
                            let jongIdx = 0;
                            if (nextI < chars.length) {
                                let n3 = this.alphabet[chars[nextI]] || chars[nextI];
                                let pJongIdx = this.jong.indexOf(n3);
                                if (pJongIdx > 0) {
                                    let isAtEnd = (nextI + 1 >= chars.length);
                                    let nextNotVowel = isAtEnd || (this.jung.indexOf(this.alphabet[chars[nextI + 1]] || chars[nextI + 1]) === -1);
                                    if (isAtEnd || nextNotVowel) {
                                        jongIdx = pJongIdx;
                                        if (nextI + 1 < chars.length) {
                                            let n4 = this.alphabet[chars[nextI + 1]] || chars[nextI + 1];
                                            let cj = "";
                                            if (n3 === 'ㄱ' && n4 === 'ㅅ') cj = 'ㄳ';
                                            else if (n3 === 'ㄴ' && n4 === 'ㅈ') cj = 'ㄵ'; else if (n3 === 'ㄴ' && n4 === 'ㅎ') cj = 'ㄶ';
                                            else if (n3 === 'ㄹ' && n4 === 'ㄱ') cj = 'ㄺ'; else if (n3 === 'ㄹ' && n4 === 'ㅁ') cj = 'ㄻ';
                                            else if (n3 === 'ㄹ' && n4 === 'ㅂ') cj = 'ㄼ'; else if (n3 === 'ㄹ' && n4 === 'ㅅ') cj = 'ㄽ';
                                            else if (n3 === 'ㄹ' && n4 === 'ㅌ') cj = 'ㄾ'; else if (n3 === 'ㄹ' && n4 === 'ㅍ') cj = 'ㄿ';
                                            else if (n3 === 'ㄹ' && n4 === 'ㅎ') cj = 'ㅀ'; else if (n3 === 'ㅂ' && n4 === 'ㅅ') cj = 'ㅄ';
                                            if (cj) {
                                                let isAfterAtEnd = (nextI + 2 >= chars.length);
                                                let afterNotVowel = isAfterAtEnd || (this.jung.indexOf(this.alphabet[chars[nextI + 2]] || chars[nextI + 2]) === -1);
                                                if (isAfterAtEnd || afterNotVowel) { jongIdx = this.jong.indexOf(cj); nextI++; }
                                            }
                                        }
                                        nextI++;
                                    }
                                }
                            }
                            res += String.fromCharCode(0xAC00 + (choIdx * 21 * 28) + (currentJungIdx * 28) + jongIdx);
                            i = nextI; continue;
                        }
                    }
                    res += c; i++;
                }
                return res;
            }
        };

        // --- Retro Audio Engine ---
        const RetroAudio = {

            bgmLoop: null,
            notes: {
                'C3': 130.81, 'Eb3': 155.56, 'F3': 174.61, 'Gb3': 185.00, 'G3': 196.00, 'Bb3': 233.08, 'C4': 261.63, 'D4': 293.66, 'Eb4': 311.13, 'E4': 329.63, 'F4': 349.23, 'Gb4': 369.99, 'G4': 392.00, 'A4': 440.00, 'Bb4': 466.16, 'B4': 493.88, 'C5': 523.25, 'E5': 659.25, 'G5': 783.99
            },
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            setVolume(val) {
                this.masterVolume = parseFloat(val);
                localStorage.setItem('dinoLexVolume', this.masterVolume);
            },
            play(type) {
                if (this.masterVolume <= 0) return;
                this.init();
                const now = this.ctx.currentTime;
                const volumeScale = this.masterVolume;

                if (type === 'stageClear') {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    gain.gain.setValueAtTime(0.15 * volumeScale, now);
                    gain.gain.exponentialRampToValueAtTime(0.01 * volumeScale, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);

                    const osc2 = this.ctx.createOscillator();
                    const gain2 = this.ctx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(600, now);
                    osc2.frequency.exponentialRampToValueAtTime(1800, now + 0.15);
                    osc2.connect(gain2); gain2.connect(this.ctx.destination);
                    gain2.gain.setValueAtTime(0.1 * volumeScale, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01 * volumeScale, now + 0.3);
                    osc2.start(now); osc2.stop(now + 0.3);
                    return;
                }

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                switch (type) {
                    case 'correct':
                        // Celebratory Arpeggio: C5, E5, G5
                        const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
                        notes.forEach((freq, i) => {
                            const o = this.ctx.createOscillator();
                            const g = this.ctx.createGain();
                            o.type = 'triangle';
                            o.frequency.setValueAtTime(freq, now + i * 0.08);
                            g.gain.setValueAtTime(0.1 * volumeScale, now + i * 0.08);
                            g.gain.exponentialRampToValueAtTime(0.01 * volumeScale, now + i * 0.08 + 0.2);
                            o.connect(g); g.connect(this.ctx.destination);
                            o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.2);
                        });
                        break;
                    case 'error':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        gain.gain.setValueAtTime(0.1 * volumeScale, now);
                        gain.gain.linearRampToValueAtTime(0.01 * volumeScale, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                        break;
                    case 'shoot':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(880, now); // High pitch start
                        osc.frequency.exponentialRampToValueAtTime(110, now + 0.1); // Quick drop (pew!)
                        gain.gain.setValueAtTime(0.1 * volumeScale, now);
                        gain.gain.exponentialRampToValueAtTime(0.01 * volumeScale, now + 0.1);
                        osc.start(now); osc.stop(now + 0.1);
                        break;
                    case 'hit':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(120, now);
                        osc.frequency.exponentialRampToValueAtTime(60, now + 0.08); // short dull thud
                        gain.gain.setValueAtTime(0.15 * volumeScale, now);
                        gain.gain.exponentialRampToValueAtTime(0.01 * volumeScale, now + 0.08);
                        osc.start(now); osc.stop(now + 0.08);
                        break;
                    case 'start':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                        gain.gain.setValueAtTime(0.1 * volumeScale, now);
                        gain.gain.linearRampToValueAtTime(0.01 * volumeScale, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                        break;
                    case 'gameOver':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                        gain.gain.setValueAtTime(0.1 * volumeScale, now);
                        gain.gain.linearRampToValueAtTime(0.01 * volumeScale, now + 0.5);
                        osc.start(now); osc.stop(now + 0.5);
                        break;
                }
            },
            startBGM(type) {
                if (this.currentBGM === type) return;
                this.stopBGM();
                this.init();
                this.currentBGM = type;
                let step = 0;
                let bpm, sequence, waveform;

                if (type === 'menu' || type === 'victory') {
                    bpm = 165;
                    sequence = ['C4', 'G4', 'C5', 'G4', 'C4', 'G4', 'C5', 'G4', 'Eb4', 'Bb4', 'Eb5', 'Bb4', 'F4', 'C5', 'F5', 'C5'];
                    waveform = 'square';
                } else if (type === 'game') {
                    bpm = 150;
                    sequence = ['C3', 'C3', 'G3', 'G3', 'Bb3', 'Bb3', 'G3', 'G3'];
                    waveform = 'square';
                } else if (type === 'fanfare') {
                    bpm = 180;
                    sequence = ['C4', 'E4', 'G4', 'C5', 'G4', 'C5', 'E5', 'G5'];
                    waveform = 'triangle';
                }

                const stepTime = 60 / bpm / 2;
                this.bgmLoop = setInterval(() => {
                    if (this.masterVolume <= 0) return;
                    const note = sequence[step % sequence.length];
                    if (note && this.notes[note]) {
                        this.playNote(this.notes[note], waveform, stepTime * 0.8);
                    }
                    step++;
                }, stepTime * 1000);
            },
            playNote(freq, waveform, duration) {
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = waveform;
                osc.frequency.setValueAtTime(freq, now);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(0.12 * this.masterVolume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.start(now);
                osc.stop(now + duration);
            },
            stopBGM() {
                if (this.bgmLoop) clearInterval(this.bgmLoop);
                this.bgmLoop = null;
                this.currentBGM = null;
            }
        };

        const CONFIG = {
            enemySize: 25,
            enemySpeed: 0.6,
            spawnInterval: 400, 
            bulletSpeed: 15,
            bulletSize: 10,
            wiggleAmplitude: 4,
            wiggleFrequency: 0.05,
            learnDuration: 60000,
            basePosition: { x: 450, y: 887.5 }, // 900 / 2, 900 - 12.5
            baseRadius: 12.5
        };

        let state = {
            isPlaying: false,
            combo: 0,
            selectedChapter: 1,
            chapters: [],
            stages: [],
            currentStageIndex: 0,
            stageWords: [],
            recallTimer: null,
            koErrorTimer: null,
            recallTimeLimit: 10000,
            wordData: [],
            currentWord: null,
            typingStage: 'en',
            wordsCorrect: 0,
            rawInput: "",
            bullets: [],
            enemies: [],
            enemySpawnTimer: 0,
            isStageTransitioning: false,
            lastInputLength: 0,
            timerValue: 0,
            timerActive: false,
            lastTime: 0
        };

        const els = {
            canvas: document.getElementById('game-canvas'),
            ctx: null, // Initialized in init
            wordDisplay: document.getElementById('word-display'),
            meaningDisplay: document.getElementById('meaning-display'),
            input: document.getElementById('typing-input'),
            wordsCorrect: document.getElementById('words-count'),
            stageDisplay: document.getElementById('stage-display'),
            combo: document.getElementById('combo'),
            startScreen: document.getElementById('start-screen'),
            stageClearScreen: document.getElementById('stage-clear-screen'),
            gameOverScreen: document.getElementById('game-over-screen'),
            finalStats: document.getElementById('final-stats-text'),
            volumeSlider: document.getElementById('volume-slider'),
            typingSection: document.getElementById('typing-section'),
            timer: document.getElementById('learn-timer')
        };

        async function init() {
            els.ctx = els.canvas.getContext('2d');

            // Trigger voice loading early for Edge
            window.speechSynthesis.getVoices();

            // Priority: Try loading from external JSON if on server, otherwise use embedded
            try {
                const response = await fetch('words01.json');
                if (response.ok) {
                    const rawData = await response.json();
                    WORD_DATABASE = rawData["시트1"];
                }
            } catch (err) {
                console.warn("Using embedded dictionary data (not on server).");
            }

            state.wordData = Object.keys(WORD_DATABASE).map(key => ({
                word: key,
                meaning: WORD_DATABASE[key].meaning,
                chapter: WORD_DATABASE[key].chapter
            }));

            // Get unique chapters for selection
            state.chapters = [...new Set(state.wordData.map(w => w.chapter))].sort((a, b) => a - b);
            renderChapterSelection();
            els.volumeSlider.value = RetroAudio.masterVolume;
            state.groundImg.src = CONFIG.assets.ground;
            state.catImg.src = CONFIG.assets.cat;
            state.bulletImg.src = CONFIG.assets.bullet;
            state.cloudImg.src = CONFIG.assets.cloud;
            state.dinoImg.src = CONFIG.assets.dino;

            // Start Menu BGM on first interaction (bypasses autoplay restrictions)
            const startBGMEvent = () => {
                if (!state.isPlaying && !RetroAudio.currentBGM) RetroAudio.startBGM('menu');
                // Remove all listeners once triggered
                ['mousedown', 'keydown', 'touchstart', 'click'].forEach(evt =>
                    document.body.removeEventListener(evt, startBGMEvent)
                );
            };
            ['mousedown', 'keydown', 'touchstart', 'click'].forEach(evt =>
                document.body.addEventListener(evt, startBGMEvent)
            );
        }

        els.volumeSlider.addEventListener('input', (e) => {
            RetroAudio.setVolume(e.target.value);
        });

        function renderChapterSelection(filter = '') {
            const container = document.querySelector('.mode-selection');
            container.innerHTML = '';

            const filtered = state.chapters.filter(ch => ch.toString().includes(filter));

            filtered.forEach(chapter => {
                const btn = document.createElement('button');
                btn.className = 'btn-mode';
                if (state.selectedChapter === chapter) btn.classList.add('active');
                btn.innerText = chapter;
                btn.onclick = (e) => setChapter(chapter, btn);
                container.appendChild(btn);
            });

            const startBtn = document.getElementById('start-btn');
            if (filtered.length > 0) startBtn.classList.remove('hidden');
            else startBtn.classList.add('hidden');
        }

        function filterChapters() {
            const val = document.getElementById('chapter-search').value;
            renderChapterSelection(val);
        }

        function setChapter(chapter, btn) {
            state.selectedChapter = chapter;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startGame() {
            const chap = state.selectedChapter;
            state.wordsCorrect = 0;
            state.combo = 0;
            state.currentStageIndex = 0;
            state.speed = CONFIG.baseSpeed;
            state.isErrorState = false;
            state.errorStateTimer = 0;
            state.isJumping = false;
            state.dinoVelocityY = 0;
            state.lastTime = 0; // Reset loop timer for smooth start

            state.stages = [
                { chapter: chap, type: 'learn' },
                { chapter: chap, type: 'recall' }
            ];

            els.wordsCorrect.innerText = '0';
            els.combo.classList.remove('active');
            els.startScreen.classList.add('hidden');
            els.gameOverScreen.classList.add('hidden');
            els.stageClearScreen.classList.add('hidden');
            els.typingSection.classList.remove('hidden');

            RetroAudio.play('start');
            RetroAudio.startBGM('game');

            state.bullets = [];
            state.enemies = [];
            state.enemySpawnTimer = 0;

            if (!state.isPlaying) {
                state.isPlaying = true;
                requestAnimationFrame(gameLoop);
            }

            startStage();
        }

        function startStage() {
            const currentStage = state.stages[state.currentStageIndex];
            state.stageWords = state.wordData
                .filter(w => w.chapter === currentStage.chapter)
                .sort(() => Math.random() - 0.5);

            state.isStageTransitioning = false;
            state.enemies = [];
            state.bullets = [];

            els.stageClearScreen.classList.add('hidden');
            els.input.disabled = false;
            els.input.value = '';
            els.input.focus();

            const chapText = currentStage.chapter;
            const typeText = currentStage.type.toUpperCase();
            els.stageDisplay.innerText = `CH ${chapText} ${typeText}`;

            if (currentStage.type === 'learn') {
                state.timerValue = CONFIG.learnDuration;
                state.timerActive = true;
                els.timer.innerText = Math.ceil(state.timerValue / 1000);
                els.timer.parentElement.classList.remove('hidden');
            } else {
                state.timerActive = false;
                els.timer.parentElement.classList.add('hidden');
            }

            RetroAudio.startBGM('game');
            nextWord();
        }

        function gameLoop(timestamp) {
            requestAnimationFrame(gameLoop);
            if (!state.isPlaying) return;

            if (!state.lastTime) state.lastTime = timestamp;
            const deltaTime = timestamp - state.lastTime;
            state.lastTime = timestamp;

            // Enemy Spawning
            if (!state.isStageTransitioning) {
                state.enemySpawnTimer += deltaTime;
                if (state.enemySpawnTimer > CONFIG.spawnInterval) {
                    state.enemySpawnTimer = 0;
                    spawnEnemy();
                }
            }

            // Update Enemies
            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const enemy = state.enemies[i];
                
                // Direction to base
                const dx = CONFIG.basePosition.x - enemy.x;
                const dy = CONFIG.basePosition.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < CONFIG.baseRadius + 10) {
                    // Reached base - Game Over placeholder
                    state.enemies.splice(i, 1);
                    continue;
                }

                // Smooth movement toward base
                enemy.x += (dx / dist) * CONFIG.enemySpeed;
                enemy.y += (dy / dist) * CONFIG.enemySpeed;

                // Wiggle effect (perpendicular to movement)
                enemy.wiggleAngle += CONFIG.wiggleFrequency;
                enemy.renderX = enemy.x + Math.sin(enemy.wiggleAngle) * CONFIG.wiggleAmplitude;
                enemy.renderY = enemy.y + Math.cos(enemy.wiggleAngle) * CONFIG.wiggleAmplitude;
            }

            // Update Bullets
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const bullet = state.bullets[i];
                
                // Move in fixed direction
                bullet.x += bullet.vx * CONFIG.bulletSpeed;
                bullet.y += bullet.vy * CONFIG.bulletSpeed;

                // Collision Check (Simple distance-based for circles/boxes)
                let hit = false;
                for (let j = state.enemies.length - 1; j >= 0; j--) {
                    const enemy = state.enemies[j];
                    const dx = bullet.x - enemy.renderX;
                    const dy = bullet.y - enemy.renderY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 20) {
                        state.enemies.splice(j, 1);
                        hit = true;
                        RetroAudio.play('hit');
                        break;
                    }
                }

                if (hit || bullet.y < -50 || bullet.x < -50 || bullet.x > els.canvas.width + 50 || bullet.y > els.canvas.height + 50) {
                    state.bullets.splice(i, 1);
                }
            }

            // --- Render ---
            const ctx = els.ctx;
            const canvas = els.canvas;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Base
            ctx.beginPath();
            ctx.arc(CONFIG.basePosition.x, CONFIG.basePosition.y, CONFIG.baseRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#4f46e5';
            ctx.fill();
            ctx.closePath();

            // Draw Enemies (Boxes)
            ctx.fillStyle = '#ef4444'; // Red for enemies
            state.enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.renderX, enemy.renderY);
                ctx.fillRect(-CONFIG.enemySize/2, -CONFIG.enemySize/2, CONFIG.enemySize, CONFIG.enemySize);
                ctx.restore();
            });

            // Draw Bullets
            ctx.fillStyle = '#fbbf24'; // Amber for bullets
            state.bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Timer Update
            if (state.timerActive && state.isPlaying && !state.isStageTransitioning) {
                state.timerValue -= deltaTime;
                if (state.timerValue < 0) state.timerValue = 0;
                els.timer.innerText = Math.ceil(state.timerValue / 1000);

                if (state.timerValue <= 0) {
                    state.timerActive = false;
                    handleStageClear();
                }
            }
        }



        function nextWord() {
            if (!state.isPlaying) return;

            // Clear any existing recall timer
            if (state.recallTimer) {
                clearTimeout(state.recallTimer);
                state.recallTimer = null;
            }

            if (state.stageWords.length === 0) {
                const currentStage = state.stages[state.currentStageIndex];
                if (currentStage.type === 'learn') {
                    // Refill and reshuffle during learn stage to keep it going for 60s
                    state.stageWords = state.wordData
                        .filter(w => w.chapter === currentStage.chapter)
                        .sort(() => Math.random() - 0.5);
                } else {
                    handleStageClear();
                    return;
                }
            }

            state.currentWord = state.stageWords.pop();
            if (!state.currentWord) {
                console.error("No words found for chapter:", currentStage.chapter);
                handleStageClear();
                return;
            }

            const currentStage = state.stages[state.currentStageIndex];
            if (currentStage.type === 'learn') {
                state.typingStage = 'en';
                speak(state.currentWord.word);
            } else {
                state.typingStage = 'recall'; // Custom type for recall
                // Start 5-second timer for recall
                state.recallTimer = setTimeout(() => {
                    handleRecallTimeout();
                }, state.recallTimeLimit);
            }

            state.rawInput = "";
            els.meaningDisplay.innerText = "";
            els.input.placeholder = "";
            els.input.value = "";
            renderWord();
        }

        function handleRecallTimeout() {
            if (!state.isPlaying) return;

            RetroAudio.play('error');
            els.wordDisplay.classList.add('shake');
            setTimeout(() => els.wordDisplay.classList.remove('shake'), 200);

            state.combo = 0;
            els.combo.classList.remove('active');

            // Show the answer and re-queue it at the end
            const word = state.currentWord.word;
            els.wordDisplay.innerHTML = `<span class="error">${word}</span>`;
            els.meaningDisplay.innerHTML = `<span style="color: var(--primary); font-size: 0.9rem;">Try again later!</span>`;

            // Add back to the beginning of the queue (will be popped last)
            state.stageWords.unshift(state.currentWord);

            setTimeout(() => {
                nextWord();
            }, 1200); // Slightly longer pause to read "Try again later!"
        }

        function handleStageClear() {
            state.isStageTransitioning = true;
            state.enemies = []; // Clear current dinos
            state.bullets = []; // Clear any remaining bullets
            els.input.disabled = true;
            els.input.value = '';
            els.wordDisplay.innerHTML = '';
            els.stageClearScreen.classList.remove('hidden');
            RetroAudio.play('stageClear');
            RetroAudio.startBGM('fanfare');

            setTimeout(() => {
                state.currentStageIndex++;
                if (state.currentStageIndex >= state.stages.length) {
                    gameOver();
                } else {
                    startStage();
                }
            }, 3000);
        }

        function renderWord() {
            const currentStage = state.stages[state.currentStageIndex];
            const isRecall = currentStage.type === 'recall';
            let word;

            if (!isRecall) {
                if (state.typingStage === 'en') {
                    word = state.currentWord.word;
                    els.meaningDisplay.innerText = "";
                } else {
                    word = state.currentWord.meaning;
                    els.meaningDisplay.innerText = state.currentWord.word;
                    els.meaningDisplay.style.color = '#94a3b8'; // Gray hint
                }
            } else {
                els.meaningDisplay.innerText = state.currentWord.meaning;
                els.meaningDisplay.style.color = 'var(--primary)';
                word = state.currentWord.word;
            }

            const typed = els.input.value;
            let html = '';
            for (let i = 0; i < word.length; i++) {
                if (i < typed.length) {
                    let isMismatch = typed[i] !== word[i];
                    let charClass = isMismatch ? 'error' : 'correct';

                    if (state.typingStage === 'ko') {
                        if (i === typed.length - 1 && typed.length <= word.length) {
                            charClass = 'correct';
                        }
                    }
                    html += `<span class="${charClass}">${word[i]}</span>`;
                } else if (i === typed.length) {
                    html += `<span class="current">${isRecall ? '?' : word[i]}</span>`;
                } else {
                    html += `<span>${isRecall ? '?' : word[i]}</span>`;
                }
            }
            els.wordDisplay.innerHTML = html;
        }

        els.input.addEventListener('keydown', (e) => {
            if (!state.isPlaying) return;
            if (state.typingStage === 'ko') {
                if (e.key.length === 1) {
                    if (/[a-zA-Z]/.test(e.key)) {
                        e.preventDefault();
                        state.rawInput += e.key;
                        const isIncrease = state.rawInput.length > state.lastInputLength;
                        state.lastInputLength = state.rawInput.length;
                        els.input.value = Hangul.compose(state.rawInput);
                        if (handleTyping() && isIncrease) spawnBullet();
                    } else {
                        e.preventDefault();
                        state.rawInput += e.key;
                        const isIncrease = state.rawInput.length > state.lastInputLength;
                        state.lastInputLength = state.rawInput.length;
                        els.input.value = Hangul.compose(state.rawInput);
                        if (handleTyping() && isIncrease) spawnBullet();
                    }
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    state.rawInput = state.rawInput.slice(0, -1);
                    els.input.value = Hangul.compose(state.rawInput);
                    handleTyping();
                    state.lastInputLength = state.rawInput.length;
                }
            }
        });

        els.input.addEventListener('input', () => {
            if (state.typingStage === 'ko') return;
            const isIncrease = els.input.value.length > state.lastInputLength;
            if (handleTyping() && isIncrease) spawnBullet();
            state.lastInputLength = els.input.value.length;
        });

        function handleTyping() {
            if (!state.isPlaying) return false;
            let isCorrect = true;
            const typed = els.input.value;
            const target = (state.typingStage === 'en' || state.typingStage === 'recall') ? state.currentWord.word : state.currentWord.meaning;
            renderWord();

            if (state.koErrorTimer) {
                clearTimeout(state.koErrorTimer);
                state.koErrorTimer = null;
            }

            if (typed === target) {
                if (state.typingStage === 'en') {
                    state.typingStage = 'ko';
                    state.rawInput = "";
                    els.input.value = '';
                    state.lastInputLength = 0;
                    els.input.placeholder = "";
                    els.meaningDisplay.innerText = "";
                    RetroAudio.play('stageClear');
                    renderWord();
                } else {
                    // Correct answer in Learn-KO or Recall stage
                    if (state.recallTimer) {
                        clearTimeout(state.recallTimer);
                        state.recallTimer = null;
                    }

                    state.wordsCorrect++;
                    state.combo++;
                    els.wordsCorrect.innerText = state.wordsCorrect;
                    els.combo.innerText = `+${state.combo}`;
                    els.combo.classList.add('active');
                    els.input.classList.add('correct-flash');
                    setTimeout(() => els.input.classList.remove('correct-flash'), 150);

                    if (state.typingStage === 'recall') {
                        speak(state.currentWord.word);
                    }

                    // Reset speed and error state on correct answer
                    state.isErrorState = false;
                    state.errorStateTimer = 0;

                    setTimeout(() => {
                        els.input.value = '';
                        state.rawInput = "";
                        state.lastInputLength = 0;
                        nextWord();
                    }, 1000);
                    RetroAudio.play('correct');
                    spawnRadialBullets(); // Bonus shot!
                    return false; // Prevent targeted bullet on word completion

                    // Dino Jump Trigger
                    if (!state.isJumping) {
                        state.isJumping = true;
                        state.dinoVelocityY = CONFIG.jumpPower;
                    }
                }
            } else if (typed.length > 0) {
                if (state.typingStage === 'en' || state.typingStage === 'recall') {
                    if (!target.startsWith(typed)) {
                        isCorrect = false;
                        state.isErrorState = true;
                        state.errorStateTimer = 1000;
                        RetroAudio.play('error');
                        els.wordDisplay.classList.add('shake');
                        setTimeout(() => els.wordDisplay.classList.remove('shake'), 200);
                        state.combo = 0;
                        els.combo.classList.remove('active');
                    }
                } else {
                    // ko stage
                    let isInstantError = false;
                    if (typed.length > target.length) {
                        isInstantError = true;
                    } else {
                        for (let j = 0; j < typed.length - 1; j++) {
                            if (typed[j] !== target[j]) {
                                isInstantError = true;
                                break;
                            }
                        }
                    }

                    if (isInstantError) {
                        isCorrect = false;
                        state.isErrorState = true;
                        state.errorStateTimer = 1000;
                        els.wordDisplay.classList.add('shake');
                        setTimeout(() => els.wordDisplay.classList.remove('shake'), 200);
                        state.combo = 0;
                        els.combo.classList.remove('active');
                    } else if (typed.length > 0 && typed[typed.length - 1] !== target[typed.length - 1]) {
                        // The last character matches length but is wrong. Give it 600ms to allow for continuous composition.
                        isCorrect = false; // Initially count as incorrect to prevent fire
                        state.koErrorTimer = setTimeout(() => {
                            if (state.isPlaying && els.input.value === typed) {
                                state.isErrorState = true;
                                state.errorStateTimer = 1000;
                                els.wordDisplay.classList.add('shake');
                                setTimeout(() => els.wordDisplay.classList.remove('shake'), 200);
                                state.combo = 0;
                                els.combo.classList.remove('active');
                            }
                        }, 600);
                    }
                }
            }
            return isCorrect;
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 3); // 0: Top, 1: Left, 2: Right
            let x, y;
            if (side === 0) {
                x = Math.random() * els.canvas.width;
                y = -CONFIG.enemySize;
            } else if (side === 1) {
                x = -CONFIG.enemySize;
                y = Math.random() * (els.canvas.height / 2);
            } else {
                x = els.canvas.width + CONFIG.enemySize;
                y = Math.random() * (els.canvas.height / 2);
            }

            state.enemies.push({
                x: x,
                y: y,
                renderX: x,
                renderY: y,
                wiggleAngle: Math.random() * Math.PI * 2,
                hp: 1
            });
        }

        function spawnBullet(customDir = null) {
            let vx = 0;
            let vy = -1;

            if (customDir) {
                vx = customDir.vx;
                vy = customDir.vy;
            } else {
                // Standard targeting logic
                let target = null;
                let minDist = Infinity;
                state.enemies.forEach(enemy => {
                    const dx = CONFIG.basePosition.x - enemy.x;
                    const dy = CONFIG.basePosition.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist) {
                        minDist = dist;
                        target = enemy;
                    }
                });

                if (target) {
                    const dx = target.renderX - CONFIG.basePosition.x;
                    const dy = target.renderY - (CONFIG.basePosition.y - 10);
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    vx = dx / dist;
                    vy = dy / dist;
                }
            }

            state.bullets.push({
                x: CONFIG.basePosition.x,
                y: CONFIG.basePosition.y - 10,
                vx: vx,
                vy: vy
            });

            RetroAudio.play('shoot');
        }

        function spawnRadialBullets() {
            const angles = [60, 75, 90, 105, 120];
            
            angles.forEach(deg => {
                const rad = (deg * Math.PI) / 180;
                spawnBullet({
                    vx: Math.cos(rad),
                    vy: -Math.sin(rad) // Mirror Y for upward direction on screen
                });
            });
        }

        function spawnCloud(initialX = null) {
            // ... (legacy cloud logic kept but unused)
        }

        function speak(text) {
            if (RetroAudio.masterVolume <= 0) return;

            // Cancel any ongoing speech. This fixes a common bug where speechSynthesis gets stuck.
            window.speechSynthesis.cancel();

            // Edge often cancels the NEW speech instantly if we don't use a small timeout after cancel()
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.volume = RetroAudio.masterVolume;

                // Attempt to explicitly set an English voice, which helps on some OS/browser combinations.
                const voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    const enVoice = voices.find(v => v.lang.startsWith('en-US')) || voices.find(v => v.lang.startsWith('en'));
                    if (enVoice) {
                        msg.voice = enVoice;
                    }
                }

                // Save reference to prevent garbage collection on long words (Chrome bug)
                window._lastSpeechMsg = msg;

                window.speechSynthesis.speak(msg);
            }, 50);
        }



        function showMenu() {
            state.isPlaying = false;
            els.startScreen.classList.remove('hidden');
            els.gameOverScreen.classList.add('hidden');
            els.stageClearScreen.classList.add('hidden');
            els.typingSection.classList.add('hidden');
            RetroAudio.startBGM('menu');

            // Re-enable input if it was disabled
            els.input.disabled = true;
            els.input.value = '';
            els.wordDisplay.innerHTML = '';
            els.meaningDisplay.innerText = '';
        }

        function gameOver() {
            state.isPlaying = false;
            els.input.disabled = true;
            els.stageClearScreen.classList.add('hidden');
            els.typingSection.classList.add('hidden');

            els.finalStats.innerText = `Words Correct: ${state.wordsCorrect}`;
            els.gameOverScreen.classList.remove('hidden');
            RetroAudio.play('gameOver');
            RetroAudio.startBGM('victory');
        }

        init();
    </script>
